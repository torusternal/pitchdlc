<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pitchDLC - Вход</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .form-container {
            max-width: 400px;
            margin: 0 auto;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--bg-dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .form-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .form-link a {
            color: var(--primary);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">pitchDLC</a>
            <div class="nav-links">
                <a href="pokupka.html" class="nav-link">Скачать</a>
                <a href="index.html#advantages" class="nav-link">Преимущества</a>
                <a href="login.html" class="nav-link btn-login" id="nav-login">Войти</a>
                <a href="profile.html" class="nav-link" id="nav-profile" style="display:none; color: var(--primary);"></a>
            </div>
        </div>
    </nav>

    <section class="hero" style="min-height: 70vh;">
        <div class="container">
            <h1 class="hero-title" style="font-size: 36px; margin-bottom: 30px;">Вход в аккаунт</h1>
            
            <div class="form-container">
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">Логин</label>
                        <input type="text" class="form-input" id="login-username" placeholder="Введите логин" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Пароль</label>
                        <input type="password" class="form-input" id="login-password" placeholder="Введите пароль" required>
                    </div>
                    <div id="login-error" style="color: #ef4444; margin-bottom: 16px; font-size: 14px; display: none;"></div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Войти</button>
                </form>
                <div class="form-link">
                    Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
                </div>
            </div>
        </div>
        <div class="hero-glow"></div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>Навигация</h4>
                    <a href="register.html">Присоединиться</a>
                    <a href="login.html">Логин</a>
                </div>
                <div class="footer-section">
                    <h4>Связь</h4>
                    <span class="footer-note">Ссылку укажете сами</span>
                    <a href="https://t.me/axiomadlc" target="_blank">Telegram</a>
                    <a href="https://discord.gg/HYKEVNtnqp" target="_blank">Discord</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 pitchDLC. Все права защищены.</p>
            </div>
        </div>
    </footer>

<script>
// Проверка авторизации при загрузке
document.addEventListener('DOMContentLoaded', function() {
    const currentUser = localStorage.getItem('axioma_user');
    const navLogin = document.getElementById('nav-login');
    const navProfile = document.getElementById('nav-profile');
    
    if (currentUser) {
        const user = JSON.parse(currentUser);
        if (navLogin) navLogin.style.display = 'none';
        if (navProfile) {
            navProfile.textContent = user.username;
            navProfile.style.display = 'inline-block';
        }
    }
});
</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
    apiKey: "AIzaSyBb8-MxoxLmaJccD8hv89RXAefSkWfFKc0",
    authDomain: "pitchdlc-b5446.firebaseapp.com",
    projectId: "pitchdlc-b5446",
    storageBucket: "pitchdlc-b5446.firebasestorage.app",
    messagingSenderId: "652141326687",
    appId: "1:652141326687:web:c1693de93ffaf89d57c6ea",
    measurementId: "G-GTGFQGZSLL"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Firebase вход
document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;
    const errorDiv = document.getElementById('login-error');
    
    errorDiv.style.display = 'none';
    
    try {
        // Используем username как email (добавляем @pitchdlc.local если нужно)
        const email = username.includes('@') ? username : username + '@pitchdlc.local';
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        
        localStorage.setItem('axioma_user', JSON.stringify({
            username: user.displayName || username,
            email: user.email
        }));
        
        window.location.href = 'index.html';
    } catch (error) {
        errorDiv.textContent = 'Неверный логин или пароль';
        errorDiv.style.display = 'block';
    }
});
</script>
</body>
</html>
